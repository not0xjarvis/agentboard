<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AgentBoard">
  <rect width="512" height="512" rx="112" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="511" height="511" rx="111.5" stroke="#30363d"/>

  <!-- Backlog column (muted) -->
  <rect x="88"  y="132" width="104" height="40" rx="12" fill="#58a6ff" fill-opacity="0.4"/>
  <rect x="88"  y="192" width="104" height="40" rx="12" fill="#58a6ff" fill-opacity="0.4"/>
  <rect x="88"  y="252" width="104" height="40" rx="12" fill="#58a6ff" fill-opacity="0.4"/>

  <!-- Building column (accent) -->
  <rect x="204" y="132" width="104" height="40" rx="12" fill="#58a6ff"/>
  <rect x="204" y="192" width="104" height="40" rx="12" fill="#58a6ff"/>

  <!-- Done column (green) -->
  <rect x="320" y="132" width="104" height="40" rx="12" fill="#3fb950"/>

  <!-- flow arrow: agent moving work to done -->
  <path d="M196 352 H316" stroke="#7d8590" stroke-width="14" stroke-linecap="round"/>
  <path d="M300 334 L324 352 L300 370" stroke="#3fb950" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
